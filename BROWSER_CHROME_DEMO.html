<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TabX Browser - Modern Chrome UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.65);
            --bg-gradient-start: #e8ecf4;
            --bg-gradient-end: #dce3ef;
            --active-tab-accent: #4a90d9;
            --text-color: #1a2b3c;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .browser-window {
            width: 96%;
            max-width: 1400px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.25),
                0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .chrome-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 14px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(130%);
            -webkit-backdrop-filter: blur(16px) saturate(130%);
        }

        .window-controls {
            display: flex;
            gap: 12px;
            padding-left: 8px;
        }

        .window-control {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            transition: transform 0.2s, opacity 0.2s;
        }
        .window-control:hover { transform: scale(1.1); opacity: 0.8; }
        .window-control.red { background: #ff5f56; }
        .window-control.yellow { background: #ffbd2e; }
        .window-control.green { background: #27c93f; }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .nav-buttons {
            display: flex;
            gap: 6px;
        }

        .nav-btn {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: none;
            background: rgba(0, 0, 0, 0.05);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .nav-btn:hover { background: rgba(0, 0, 0, 0.1); transform: scale(1.05); }

        .nav-btn svg {
            width: 18px;
            height: 18px;
            stroke: #3a4b5c;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .omnibox {
            flex: 1;
            max-width: 700px;
            height: 38px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 10px;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.06);
        }

        .omnibox input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            color: var(--text-color);
            outline: none;
        }

        .right-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .action-icon:hover { background: rgba(0, 0, 0, 0.06); }

        .action-icon svg {
            width: 18px;
            height: 18px;
            stroke: #3a4b5c;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .profile-avatar {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .profile-avatar:hover { transform: scale(1.05); }

        .tab-strip-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(130%);
            -webkit-backdrop-filter: blur(16px) saturate(130%);
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            padding: 8px 20px 4px;
        }

        .tab-strip {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 0;
        }

        .tab {
            height: 34px;
            max-width: 240px;
            min-width: 160px;
            border-radius: 10px 10px 0 0;
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-top: 3px solid transparent;
        }
        .tab:hover { background: rgba(255, 255, 255, 0.9); }
        .tab.active {
            background: #ffffff;
            border-top-color: var(--active-tab-accent);
            box-shadow: 0 -4px 12px -2px rgba(74, 144, 217, 0.15), 0 2px 8px -2px rgba(0, 0, 0, 0.08);
        }

        .tab-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; }
        .tab-icon svg { width: 14px; height: 14px; stroke: var(--active-tab-accent); stroke-width: 2; fill: none; }

        .tab-title {
            font-size: 13px;
            color: #3a4b5c;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .close-tab {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.2s ease;
        }
        .tab:hover .close-tab, .tab.active .close-tab { opacity: 1; }

        .close-tab svg {
            width: 14px;
            height: 14px;
            stroke: #6b7c8d;
            stroke-width: 2;
            fill: none;
        }

        .add-tab-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px 10px 0 0;
            border: none;
            background: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .add-tab-btn:hover { background: rgba(74, 144, 217, 0.1); }

        .add-tab-btn svg {
            width: 18px;
            height: 18px;
            stroke: var(--active-tab-accent);
            stroke-width: 2;
            fill: none;
        }
    </style>
</head>
<body>
    <div class="browser-window">
        <!-- macOS Window Controls -->
        <div class="window-controls">
            <div class="window-control red"></div>
            <div class="window-control yellow"></div>
            <div class="window-control green"></div>
        </div>

        <!-- Chrome Container -->
        <div class="chrome-container">
            <!-- Toolbar with Nav & Omnibox -->
            <div class="toolbar">
                <!-- Navigation Buttons -->
                <div class="nav-buttons">
                    <button class="nav-btn" title="Geri">
                        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <button class="nav-btn" title="İleri">
                        <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                    </button>
                    <button class="nav-btn" title="Yenile">
                        <svg viewBox="0 0 24 24">
                            <path d="M23 4v6h-6M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                    </button>
                </div>

                <!-- Omnibox -->
                <div class="omnibox">
                    <input type="text" placeholder="Adres girin veya arayın...">
                </div>

                <!-- Right Icons -->
                <div class="right-icons">
                    <button class="action-icon" title="Yer İmi">
                        <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                    </button>
                    <button class="action-icon" title="Uzantılar">
                        <svg viewBox="0 0 24 24">
                            <rect x="4" y="4" width="16" height="16" rx="2"/>
                            <rect x="9" y="9" width="6" height="6"/>
                        </svg>
                    </button>
                    <div class="profile-avatar">
                        <svg viewBox="0 0 24 24" style="width:34px;height:34px;">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <button class="action-icon" title="Menü">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/><circle cx="5" cy="12" r="2"/></svg>
                    </button>
                </div>
            </div>

            <!-- Tab Strip -->
            <div class="tab-strip-container">
                <div class="tab-strip">
                    <!-- Active Tab -->
                    <div class="tab active">
                        <div class="tab-icon">
                            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                        </div>
                        <span class="tab-title">Yeni Sekme</span>
                        <button class="close-tab" title="Kapat">
                            <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
                        </button>
                    </div>

                    <!-- Add Tab Button -->
                    <button class="add-tab-btn" title="Yeni sekme">
                        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
